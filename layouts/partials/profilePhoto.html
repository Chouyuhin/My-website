<div class="profile-card rounded-3xl shadow-lg p-6 text-center dark:text-gray-300 text-gray-900">
  <img
    class="mx-auto mb-4 rounded-full w-full"
    src="{{ `images` | relURL }}/{{ .Site.Params.profile.photo }}"
    alt="{{ .Site.Params.author }}"
    style="width: 100%; max-width: 100%; max-height: 550px; height: auto; object-fit: contain;"
  />
  <!-- 👇 学术信息 -->
  <h1 class="text-2xl font-semibold tracking-wide dark:text-gray-300 text-gray-900">{{ .Site.Params.profile.name }}</h1>
  <p class="text-lg dark:text-gray-400 text-gray-600">{{ .Site.Params.profile.tagline }}</p>
  <p class="text-sm italic dark:text-gray-500 text-gray-600">{{ .Site.Params.profile.location }}</p>
</div>
