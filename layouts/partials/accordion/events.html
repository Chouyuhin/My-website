{{ range sort .Site.Params.events.list "date" "desc" }}
<div class="event-item mb-6 p-4 bg-gray-50 dark:bg-gray-800 rounded-lg transition-all duration-200 hover:shadow-md">
  <div class="flex flex-col md:flex-row md:items-start">
    <span class="inline-flex items-center px-3 py-1 text-sm font-semibold bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded-full mb-2 md:mb-0 md:mr-4">
      <i class="fas fa-calendar-alt mr-2"></i>
      {{ .date }}
    </span>
    <div class="flex-1">
      <h4 class="text-lg font-semibold mb-1">
        {{ if .link }}<a href="{{ .link }}" class="hover:text-blue-600 dark:hover:text-yellow-400 inline-flex items-center">{{ .title }} <i class="fas fa-external-link-alt ml-1 text-xs opacity-70"></i></a>
        {{ else }}{{ .title }}{{ end }}
      </h4>
      {{ if .description }}
      <p class="text-gray-700 dark:text-gray-300 mb-0 mt-2">{{ .description | markdownify }}</p>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
