<div class="publication-item mb-4 p-4 border-l-4 border-blue-500 bg-gray-50 dark:bg-gray-800 rounded-r-lg">
  <div class="flex justify-between items-start">
    <div class="flex-1 flex items-start">
      <i class="fas fa-file-alt text-blue-500 dark:text-yellow-400 mt-1 mr-3 flex-shrink-0"></i>
      <div class="flex-1">
        <h5 class="font-bold text-lg mb-1">
          {{ if .pub.url }}<a href="{{ .pub.url }}" class="text-blue-600 dark:text-yellow-400 hover:underline inline-flex items-center">{{ .pub.title | markdownify }} <i class="fas fa-external-link-alt ml-1 text-xs opacity-70"></i></a>
          {{ else }}{{ .pub.title | markdownify }}{{ end }}
        </h5>
        <p class="text-gray-700 dark:text-gray-300 mb-1">{{ .pub.authors | markdownify }}</p>
        <p class="text-gray-600 dark:text-gray-400 text-sm">{{ .pub.journal | markdownify }} ({{ .pub.date }})</p>
      </div>
    </div>
    {{ if .pub.type }}<span class="ml-4 px-2 py-1 text-xs font-semibold bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded-full">{{ .pub.type }}</span>{{ end }}
  </div>
</div>
