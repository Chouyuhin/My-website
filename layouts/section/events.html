{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 py-12">
  <div class="text-center mb-12">
    <h1 class="text-4xl font-bold mb-4 dark:text-gray-300 bg-gradient-to-r from-gray-800 to-gray-600 dark:from-yellow-400 dark:to-yellow-600 bg-clip-text text-transparent">Events & News</h1>
    <p class="text-gray-600 dark:text-gray-400 max-w-2xl mx-auto">A timeline of conferences, presentations, awards, and other professional milestones.</p>
  </div>

  <div class="relative">
    <div class="relative z-10">
      {{ partial "timeline/events-timeline-simple" . }}
    </div>
  </div>

  <!-- Back to home link -->
  <div class="mt-16 text-center">
    <a href="/" class="inline-flex items-center px-5 py-3 rounded-full bg-gradient-to-r from-gray-50 to-gray-100 dark:from-gray-800 dark:to-gray-900 hover:from-gray-100 hover:to-gray-200 dark:hover:from-gray-700 dark:hover:to-gray-800 text-gray-700 dark:text-gray-300 font-medium transition-all duration-200 shadow-md hover:shadow-lg group">
      <i class="fas fa-arrow-left mr-3"></i>
      Back to Home
      <i class="fas fa-home ml-3"></i>
    </a>
  </div>
</div>
{{ end }}
